<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIQ Cooling Time Charge Station</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #5BC8E8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
    }

    .uiq-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .uiq-logo-img {
      width: 250px;
      margin-bottom: 30px;
      object-fit: contain;
    }

    .station-badge {
      color: #fff;
      font-size: 30px;
      font-weight: 300;
      padding: 5px 18px;
      margin-bottom: 10px;
    }

    .timer-ring-wrap {
      position: relative;
      width: 250px;
      height: 250px;
      margin-bottom: 20px;
    }

    .timer-ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.25);
      stroke-width: 12;
    }

    .ring-progress {
      fill: none;
      stroke: #fff;
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 660;
      stroke-dashoffset: 660;
      transition: stroke-dashoffset 0.05s linear;
    }

    .ring-progress.success { stroke: #b6f7c1; }
    .ring-progress.over    { stroke: #ffb3b3; }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .timer-num {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 76px;
      color: #fff;
      line-height: 1;
    }

    .timer-unit {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      font-family: 'Arial Narrow', Arial, sans-serif;
    }

    .target-line {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      opacity: 0.9;
      margin-bottom: 20px;
      text-align: center;
      font-family: 'Arial Narrow', Arial, sans-serif;
    }

    .result-msg {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 30px;
      color: #fff;
      min-height: 42px;
      text-align: center;
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result-msg.show    { opacity: 1; }
    .result-msg.success { color: #b6f7c1; }
    .result-msg.over    { color: #ffb3b3; }

    .btn-main {
      background: #fff;
      color: #1a9ec0;
      border: none;
      border-radius: 50px;
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 24px;
      padding: 14px 52px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform 0.1s;
      min-width: 200px;
    }

    .btn-main:active { transform: scale(0.95); }
    .btn-main.stop   { background: #ffe066; color: #8a6700; }
    .btn-main.reset  {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 17px;
      padding: 10px 36px;
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
      text-align: center;
      font-family: 'Arial Narrow', Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="uiq-wrap">

    <img class="uiq-logo-img" src="cooling-time-logo-sky.png" alt="UIQ logo">

    <div class="station-badge">⚡  3 SEC CHALLENGE  ⚡</div>

    <div class="timer-ring-wrap">
      <svg width="240" height="240" viewBox="0 0 240 240">
        <circle class="ring-bg" cx="120" cy="120" r="105"/>
        <circle class="ring-progress" id="ring" cx="120" cy="120" r="105"/>
      </svg>
      <div class="timer-display">
        <div class="timer-num" id="timerNum">0.00</div>
        <div class="timer-unit">SECONDS</div>
      </div>
    </div>

    <div class="target-line">TARGET : JUST 3 SECONDS TO COOL</div>
    <div class="result-msg" id="resultMsg"></div>

    <button class="btn-main" id="mainBtn" onclick="handleBtn()">START</button>
    <button class="btn-main reset" id="resetBtn" onclick="handleReset()" style="display:none;">RETRY</button>
    <div class="hint" id="hintText">버튼을 눌러 시작하세요</div>

  </div>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 105;
    const TARGET = 3.0;
    const MAX = 6.0;

    let state = 'idle';
    let startTime = null;
    let elapsed = 0;
    let rafId = null;

    const ring      = document.getElementById('ring');
    const timerNum  = document.getElementById('timerNum');
    const resultMsg = document.getElementById('resultMsg');
    const mainBtn   = document.getElementById('mainBtn');
    const resetBtn  = document.getElementById('resetBtn');
    const hintText  = document.getElementById('hintText');

    ring.style.strokeDasharray  = CIRCUMFERENCE;
    ring.style.strokeDashoffset = CIRCUMFERENCE;

    function setRing(sec) {
      const ratio  = Math.min(sec / MAX, 1);
      const offset = CIRCUMFERENCE * (1 - ratio);
      ring.style.strokeDashoffset = offset;
      ring.classList.remove('success', 'over');
      if (sec >= TARGET && sec <= TARGET + 0.3) ring.classList.add('success');
      else if (sec > TARGET + 0.3)              ring.classList.add('over');
    }

    function tick() {
      elapsed = (performance.now() - startTime) / 1000;
      timerNum.textContent = elapsed.toFixed(2);
      setRing(elapsed);
      if (elapsed < MAX) {
        rafId = requestAnimationFrame(tick);
      } else {
        stopTimer();
      }
    }

    function stopTimer() {
      cancelAnimationFrame(rafId);
      state = 'done';
      const diff = Math.abs(elapsed - TARGET);
      if      (diff <= 0.15)     { resultMsg.textContent = 'PERFECT!';  resultMsg.className = 'result-msg show success'; }
      else if (diff <= 0.4)      { resultMsg.textContent = 'SO CLOSE!'; resultMsg.className = 'result-msg show success'; }
      else if (elapsed < TARGET) { resultMsg.textContent = 'TOO FAST!'; resultMsg.className = 'result-msg show'; }
      else                       { resultMsg.textContent = 'TOO SLOW!'; resultMsg.className = 'result-msg show over'; }
      mainBtn.style.display = 'none';
      resetBtn.style.display = 'block';
      hintText.textContent = '결과: ' + elapsed.toFixed(2) + '초  |  목표: 3.00초';
    }

    function handleBtn() {
      if (state === 'idle') {
        state = 'running';
        startTime = performance.now();
        mainBtn.textContent = 'STOP';
        mainBtn.classList.add('stop');
        hintText.textContent = '3초에 멈추세요!';
        resultMsg.className = 'result-msg';
        rafId = requestAnimationFrame(tick);
      } else if (state === 'running') {
        cancelAnimationFrame(rafId);
        stopTimer();
      }
    }

    function handleReset() {
      cancelAnimationFrame(rafId);
      state = 'idle';
      elapsed = 0;
      startTime = null;
      timerNum.textContent = '0.00';
      ring.style.strokeDashoffset = CIRCUMFERENCE;
      ring.classList.remove('success', 'over');
      resultMsg.className = 'result-msg';
      mainBtn.textContent = 'START';
      mainBtn.classList.remove('stop');
      mainBtn.style.display = 'block';
      resetBtn.style.display = 'none';
      hintText.textContent = '버튼을 눌러 시작하세요';
    }
  </script>
</body>
</html>
