<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="apple-touch-icon" href="icon2.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UIQ 3SEC">
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIQ Cooling Time Charge Station</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #5BC8E8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
    }

    .uiq-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    .uiq-logo-img {
      width: 250px;
      margin-bottom: 20px;
      object-fit: contain;
    }

    .station-badge {
      color: #fff;
      font-size: 18px;
      font-weight: 300;
      white-space: nowrap;
      margin-bottom: 16px;
      text-align: center;
    }

    .timer-ring-wrap {
      position: relative;
      width: 250px;
      height: 250px;
      margin-bottom: 20px;
    }

    .timer-ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.25);
      stroke-width: 12;
    }

    .ring-progress {
      fill: none;
      stroke: #fff;
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 660;
      stroke-dashoffset: 660;
      transition: stroke-dashoffset 0.05s linear;
    }

    .ring-progress.success { stroke: #b6f7c1; }
    .ring-progress.over    { stroke: #ffb3b3; }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .timer-num {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 76px;
      color: #fff;
      line-height: 1;
    }

    .timer-unit {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      font-family: 'Arial Narrow', Arial, sans-serif;
    }

    .target-line {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      opacity: 0.9;
      margin-bottom: 20px;
      text-align: center;
      font-family: 'Arial Narrow', Arial, sans-serif;
    }

    .result-msg {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 30px;
      color: #fff;
      min-height: 42px;
      text-align: center;
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result-msg.show    { opacity: 1; }
    .result-msg.success { color: #b6f7c1; }
    .result-msg.over    { color: #ffb3b3; }

    .btn-main {
      background: #fff;
      color: #1a9ec0;
      border: none;
      border-radius: 50px;
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 24px;
      padding: 14px 52px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform 0.1s;
      min-width: 200px;
    }

    .btn-main:active { transform: scale(0.95); }
    .btn-main.stop   { background: #ffe066; color: #8a6700; }
    .btn-main.reset  {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 17px;
      padding: 10px 36px;
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
      text-align: center;
      font-family: 'Arial Narrow', Arial, sans-serif;
    }

    /* 아이패드 */
    @media (min-width: 600px) {
      .uiq-wrap { max-width: 700px; }
      .uiq-logo-img { width: 380px; margin-bottom: 30px; }
      .station-badge { font-size: 28px; margin-bottom: 24px; }
      .timer-ring-wrap { width: 420px; height: 420px; margin-bottom: 30px; }
      .timer-num { font-size: 130px; }
      .timer-unit { font-size: 22px; }
      .target-line { font-size: 22px; margin-bottom: 30px; }
      .result-msg { font-size: 52px; min-height: 70px; }
      .btn-main { font-size: 36px; padding: 22px 90px; min-width: 320px; }
      .btn-main.reset { font-size: 24px; padding: 14px 50px; }
      .hint { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="uiq-wrap">

    <img class="uiq-logo-img" src="cooling-time-logo-sky.png" alt="UIQ logo">
    <div class="station-badge">⚡ 3 SECONDS CHALLENGE ⚡</div>

    <div class="timer-ring-wrap">
      <svg id="ringsvg" width="250" height="250" viewBox="0 0 250 250">
        <circle class="ring-bg" cx="125" cy="125" r="105"/>
        <circle class="ring-progress" id="ring" cx="125" cy="125" r="105"/>
      </svg>
      <div class="timer-display">
        <div class="timer-num" id="timerNum">0.00</div>
        <div class="timer-unit">SECONDS</div>
      </div>
    </div>

    <div class="target-line">TARGET : JUST 3 SECONDS TO COOL</div>
    <div class="result-msg" id="resultMsg"></div>

    <button class="btn-main" id="mainBtn" onclick="handleBtn()">START</button>
    <button class="btn-main reset" id="resetBtn" onclick="handleReset()" style="display:none;">RETRY</button>
    <div class="hint" id="hintText">버튼을 눌러 시작하세요</div>

  </div>
